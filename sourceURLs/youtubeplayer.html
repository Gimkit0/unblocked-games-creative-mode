<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Search</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #202020;
    }

    .search-bar {
      display: flex;
      justify-content: center;
      margin: 20px;
    }

    input {
      padding: 12px;
      width: 350px;
      border: none;
      border-radius: 8px 0 0 8px;
      outline: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #ff0000;
      color: white;
      cursor: pointer;
      border-radius: 0 8px 8px 0;
    }

    button:hover {
      background: #cc0000;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .video {
      background: #181818;
      padding: 10px;
      border-radius: 12px;
      transition: transform 0.2s;
    }

    .video:hover {
      transform: scale(1.03);
    }

    iframe {
      width: 100%;
      border-radius: 10px;
    }

    p {
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>YouTube Search</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search videos...">
  <button onclick="searchVideos()">Search</button>
</div>

<div id="results"></div>
